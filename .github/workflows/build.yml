name: Build OverlayNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create full Android project
        run: |
          mkdir -p app/src/main/java/com/overlaynote/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper

          # ── settings.gradle ──────────────────────────
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "OverlayNote"
          include ':app'
          SETTINGS

          # ── Root build.gradle ─────────────────────────
          cat > build.gradle << 'ROOTGRADLE'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          ROOTGRADLE

          # ── App build.gradle ──────────────────────────
          cat > app/build.gradle << 'APPGRADLE'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.overlaynote.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.overlaynote.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.lifecycle:lifecycle-service:2.7.0'
          }
          APPGRADLE

          # ── gradle-wrapper.properties ─────────────────
          cat > gradle/wrapper/gradle-wrapper.properties << 'GWPROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GWPROPS

          # ── Download gradle wrapper jar ───────────────
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar || true

          # ── gradlew ───────────────────────────────────
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME="$(cd "$(dirname "$0")" && pwd)"
          exec java -jar "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" "$@"
          GRADLEW
          chmod +x gradlew

          # ── AndroidManifest.xml ───────────────────────
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application
                  android:allowBackup="true"
                  android:label="OverlayNote"
                  android:theme="@style/Theme.OverlayNote"
                  android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".SessionActivity" android:exported="false"/>
                  <service android:name=".OverlayService" android:exported="false"
                      android:foregroundServiceType="specialUse">
                      <property android:name="android.app.PROPERTY_SPECIAL_USE_FGS_SUBTYPE"
                          android:value="overlayNote"/>
                  </service>
              </application>
          </manifest>
          MANIFEST

          # ── colors.xml ────────────────────────────────
          cat > app/src/main/res/values/colors.xml << 'COLORS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0D0F14</color>
              <color name="surface">#151820</color>
              <color name="surface_high">#1E2230</color>
              <color name="border">#2A2F40</color>
              <color name="blue">#4A8FE7</color>
              <color name="teal">#2ECFB0</color>
              <color name="amber">#F5A623</color>
              <color name="red">#E05C5C</color>
              <color name="text_primary">#EEF2FF</color>
              <color name="text_secondary">#8892AA</color>
              <color name="text_dim">#556070</color>
              <color name="white">#FFFFFF</color>
          </resources>
          COLORS

          # ── strings.xml ───────────────────────────────
          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">OverlayNote</string>
          </resources>
          STRINGS

          # ── themes.xml ────────────────────────────────
          cat > app/src/main/res/values/themes.xml << 'THEMES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.OverlayNote" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/blue</item>
                  <item name="colorPrimaryVariant">@color/blue</item>
                  <item name="colorOnPrimary">@color/white</item>
                  <item name="colorSecondary">@color/teal</item>
                  <item name="android:windowBackground">@color/bg_dark</item>
                  <item name="android:statusBarColor">@color/surface</item>
              </style>
              <style name="ToolBtn">
                  <item name="android:layout_width">38dp</item>
                  <item name="android:layout_height">38dp</item>
                  <item name="android:layout_margin">2dp</item>
                  <item name="android:background">?attr/selectableItemBackgroundBorderless</item>
                  <item name="android:padding">6dp</item>
              </style>
          </resources>
          THEMES

          # ── ic_launcher.xml ───────────────────────────
          cat > app/src/main/res/mipmap-hdpi/ic_launcher.xml << 'ICON'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/blue"/>
              <foreground android:drawable="@color/teal"/>
          </adaptive-icon>
          ICON

          # ── toolbar_bg.xml ────────────────────────────
          cat > app/src/main/res/drawable/toolbar_bg.xml << 'DRAWBG'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#E6151820"/>
              <corners android:radius="14dp"/>
              <stroke android:width="1dp" android:color="#2A2F40"/>
          </shape>
          DRAWBG

          cat > app/src/main/res/drawable/circle_white.xml << 'CW'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#FFFFFF"/>
          </shape>
          CW

          cat > app/src/main/res/drawable/circle_gray.xml << 'CG'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#8892AA"/>
          </shape>
          CG

          cat > app/src/main/res/drawable/edit_text_bg.xml << 'ETB'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1E2230"/>
              <corners android:radius="8dp"/>
              <stroke android:width="1dp" android:color="#2A2F40"/>
          </shape>
          ETB

          # ── activity_main.xml ─────────────────────────
          cat > app/src/main/res/layout/activity_main.xml << 'LMAIN'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_dark">
              <LinearLayout android:layout_width="match_parent" android:layout_height="56dp"
                  android:background="@color/surface" android:elevation="4dp"
                  android:gravity="center_vertical" android:paddingStart="16dp" android:paddingEnd="16dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="✏ OverlayNote" android:textColor="@color/text_primary"
                      android:textSize="18sp" android:textStyle="bold"/>
              </LinearLayout>
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent"
                  android:orientation="vertical" android:paddingTop="56dp">
                  <LinearLayout android:id="@+id/emptyView" android:layout_width="match_parent"
                      android:layout_height="match_parent" android:gravity="center"
                      android:orientation="vertical" android:visibility="gone">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="📒" android:textSize="56sp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="No sessions yet" android:textColor="@color/text_primary"
                          android:textSize="18sp" android:layout_marginTop="12dp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Tap + to start" android:textColor="@color/text_secondary"
                          android:textSize="14sp" android:layout_marginTop="6dp"/>
                  </LinearLayout>
                  <androidx.recyclerview.widget.RecyclerView android:id="@+id/recyclerSessions"
                      android:layout_width="match_parent" android:layout_height="match_parent"
                      android:padding="12dp" android:clipToPadding="false"/>
              </LinearLayout>
              <com.google.android.material.floatingactionbutton.FloatingActionButton
                  android:id="@+id/fab" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:layout_gravity="bottom|end"
                  android:layout_margin="20dp" android:contentDescription="New Session"
                  app:srcCompat="@android:drawable/ic_input_add" app:backgroundTint="@color/blue"/>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          LMAIN

          # ── item_session.xml ──────────────────────────
          cat > app/src/main/res/layout/item_session.xml << 'LITEM'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.cardview.widget.CardView xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/card" android:layout_width="match_parent"
              android:layout_height="wrap_content" android:layout_marginBottom="10dp"
              app:cardBackgroundColor="@color/surface" app:cardCornerRadius="12dp">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:padding="16dp" android:orientation="horizontal" android:gravity="center_vertical">
                  <TextView android:layout_width="48dp" android:layout_height="48dp"
                      android:gravity="center" android:text="📝" android:textSize="24sp"
                      android:background="@color/surface_high" android:layout_marginEnd="14dp"/>
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:orientation="vertical">
                      <TextView android:id="@+id/tvSubject" android:layout_width="match_parent"
                          android:layout_height="wrap_content" android:textColor="@color/text_primary"
                          android:textSize="15sp" android:textStyle="bold" android:maxLines="1"
                          android:ellipsize="end"/>
                      <TextView android:id="@+id/tvTopic" android:layout_width="match_parent"
                          android:layout_height="wrap_content" android:textColor="@color/text_secondary"
                          android:textSize="13sp" android:layout_marginTop="2dp" android:maxLines="1"
                          android:ellipsize="end"/>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                          android:orientation="horizontal" android:layout_marginTop="6dp">
                          <TextView android:id="@+id/tvDate" android:layout_width="wrap_content"
                              android:layout_height="wrap_content" android:textColor="@color/text_dim"
                              android:textSize="12sp"/>
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text=" · " android:textColor="@color/text_dim" android:textSize="12sp"/>
                          <TextView android:id="@+id/tvPages" android:layout_width="wrap_content"
                              android:layout_height="wrap_content" android:textColor="@color/text_dim"
                              android:textSize="12sp"/>
                      </LinearLayout>
                  </LinearLayout>
                  <ImageButton android:id="@+id/btnDelete" android:layout_width="36dp"
                      android:layout_height="36dp" android:src="@android:drawable/ic_menu_delete"
                      android:background="?attr/selectableItemBackgroundBorderless"
                      android:tint="@color/red" android:contentDescription="Delete"/>
              </LinearLayout>
          </androidx.cardview.widget.CardView>
          LITEM

          # ── dialog_new_session.xml ────────────────────
          cat > app/src/main/res/layout/dialog_new_session.xml << 'LDIALOG'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="vertical" android:padding="20dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="SUBJECT" android:textColor="@color/text_secondary" android:textSize="11sp"/>
              <EditText android:id="@+id/etSubject" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:hint="e.g. C Programming"
                  android:inputType="textCapSentences" android:padding="12dp"
                  android:background="@drawable/edit_text_bg"
                  android:textColor="@color/text_primary" android:textColorHint="@color/text_dim"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="TOPIC" android:textColor="@color/text_secondary"
                  android:textSize="11sp" android:layout_marginTop="16dp"/>
              <EditText android:id="@+id/etTopic" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:hint="e.g. Recursion Trees"
                  android:inputType="textCapSentences" android:padding="12dp"
                  android:background="@drawable/edit_text_bg"
                  android:textColor="@color/text_primary" android:textColorHint="@color/text_dim"/>
          </LinearLayout>
          LDIALOG

          # ── activity_session.xml ──────────────────────
          cat > app/src/main/res/layout/activity_session.xml << 'LSESSION'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@color/bg_dark"
              android:padding="24dp" android:gravity="center">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="📒" android:textSize="64sp" android:layout_marginBottom="20dp"/>
              <TextView android:id="@+id/tvSubject" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:textColor="@color/text_primary"
                  android:textSize="22sp" android:textStyle="bold" android:gravity="center"/>
              <TextView android:id="@+id/tvTopic" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:textColor="@color/blue"
                  android:textSize="15sp" android:layout_marginTop="6dp" android:gravity="center"/>
              <TextView android:id="@+id/tvDate" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:textColor="@color/text_dim"
                  android:textSize="13sp" android:layout_marginTop="4dp" android:gravity="center"/>
              <TextView android:id="@+id/tvPages" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:textColor="@color/text_secondary"
                  android:textSize="13sp" android:layout_marginTop="4dp" android:gravity="center"/>
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="The overlay floats over YouTube, Meet, or any app.\n\nTap Launch — then open your lecture app. The writing toolbar will appear on top."
                  android:textColor="@color/text_secondary" android:textSize="14sp"
                  android:gravity="center" android:lineSpacingMultiplier="1.5"
                  android:layout_marginTop="24dp" android:layout_marginBottom="32dp"/>
              <Button android:id="@+id/btnLaunchOverlay" android:layout_width="match_parent"
                  android:layout_height="52dp" android:text="✏  Launch Overlay"
                  android:textColor="#FFFFFF" android:textSize="16sp" android:textStyle="bold"
                  android:backgroundTint="@color/blue" android:layout_marginBottom="12dp"/>
              <Button android:id="@+id/btnBack" android:layout_width="match_parent"
                  android:layout_height="48dp" android:text="← Back"
                  android:textColor="@color/text_secondary" android:backgroundTint="@color/surface_high"/>
          </LinearLayout>
          LSESSION

          # ── overlay_main.xml ──────────────────────────
          cat > app/src/main/res/layout/overlay_main.xml << 'LOVERLAY'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@android:color/transparent">
              <com.overlaynote.app.DrawingView android:id="@+id/drawingView"
                  android:layout_width="match_parent" android:layout_height="match_parent"
                  android:background="@android:color/transparent"/>
          </FrameLayout>
          LOVERLAY

          # ── overlay_toolbar.xml ───────────────────────
          cat > app/src/main/res/layout/overlay_toolbar.xml << 'LTOOLBAR'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="52dp" android:layout_height="wrap_content"
              android:orientation="vertical" android:gravity="center_horizontal"
              android:background="@drawable/toolbar_bg" android:paddingTop="8dp"
              android:paddingBottom="10dp" android:paddingStart="6dp" android:paddingEnd="6dp"
              android:elevation="16dp">
              <View android:id="@+id/dragHandle" android:layout_width="28dp" android:layout_height="4dp"
                  android:background="@color/border" android:layout_marginBottom="6dp"/>
              <ImageButton android:id="@+id/btnPen" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_edit" android:contentDescription="Pen"
                  android:tint="@color/text_primary"/>
              <ImageButton android:id="@+id/btnPencil" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_edit" android:alpha="0.5"
                  android:contentDescription="Pencil" android:tint="@color/text_primary"/>
              <ImageButton android:id="@+id/btnHighlighter" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_add" android:contentDescription="Highlighter"
                  android:tint="@color/amber"/>
              <ImageButton android:id="@+id/btnEraser" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_close_clear_cancel"
                  android:contentDescription="Eraser" android:tint="@color/text_primary"/>
              <View android:layout_width="32dp" android:layout_height="1dp"
                  android:background="@color/border" android:layout_marginTop="4dp" android:layout_marginBottom="4dp"/>
              <View android:id="@+id/btnColor" android:layout_width="28dp" android:layout_height="28dp"
                  android:background="@drawable/circle_white" android:layout_margin="4dp"
                  android:clickable="true" android:focusable="true" android:contentDescription="Color"/>
              <View android:id="@+id/btnSize" android:layout_width="16dp" android:layout_height="16dp"
                  android:background="@drawable/circle_gray" android:layout_margin="4dp"
                  android:clickable="true" android:focusable="true" android:contentDescription="Size"/>
              <View android:layout_width="32dp" android:layout_height="1dp"
                  android:background="@color/border" android:layout_marginTop="4dp" android:layout_marginBottom="4dp"/>
              <ImageButton android:id="@+id/btnUndo" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_revert" android:contentDescription="Undo"
                  android:tint="@color/text_primary"/>
              <ImageButton android:id="@+id/btnRedo" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_send" android:contentDescription="Redo"
                  android:tint="@color/text_primary"/>
              <ImageButton android:id="@+id/btnClear" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_delete" android:tint="@color/red"
                  android:contentDescription="Clear"/>
              <View android:layout_width="32dp" android:layout_height="1dp"
                  android:background="@color/border" android:layout_marginTop="4dp" android:layout_marginBottom="4dp"/>
              <ImageButton android:id="@+id/btnMode" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_view" android:contentDescription="Mode"
                  android:tint="@color/teal"/>
              <ImageButton android:id="@+id/btnPrevPage" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_media_previous" android:contentDescription="Prev"
                  android:tint="@color/text_primary"/>
              <TextView android:id="@+id/tvPageIndicator" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="1/1"
                  android:textColor="@color/text_secondary" android:textSize="10sp" android:gravity="center"/>
              <ImageButton android:id="@+id/btnNextPage" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_media_next" android:contentDescription="Next"
                  android:tint="@color/text_primary"/>
              <ImageButton android:id="@+id/btnNewPage" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_input_add" android:tint="@color/teal"
                  android:contentDescription="New page"/>
              <View android:layout_width="32dp" android:layout_height="1dp"
                  android:background="@color/border" android:layout_marginTop="4dp" android:layout_marginBottom="4dp"/>
              <ImageButton android:id="@+id/btnSave" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_save" android:tint="@color/amber"
                  android:contentDescription="Save"/>
              <ImageButton android:id="@+id/btnClose" style="@style/ToolBtn"
                  android:src="@android:drawable/ic_menu_close_clear_cancel"
                  android:tint="@color/text_dim" android:contentDescription="Close"/>
          </LinearLayout>
          LTOOLBAR

          # ── Kotlin source files ───────────────────────
          cat > app/src/main/java/com/overlaynote/app/DrawingView.kt << 'DRAWINGVIEW'
          package com.overlaynote.app
          import android.content.Context; import android.graphics.*; import android.util.AttributeSet; import android.view.MotionEvent; import android.view.View
          enum class DrawingTool { PEN, PENCIL, HIGHLIGHTER, ERASER }
          class DrawingView @JvmOverloads constructor(context: Context, attrs: AttributeSet? = null) : View(context, attrs) {
              private val paint = Paint().apply { isAntiAlias=true; isDither=true; style=Paint.Style.STROKE; strokeJoin=Paint.Join.ROUND; strokeCap=Paint.Cap.ROUND }
              private val eraserPaint = Paint().apply { isAntiAlias=true; style=Paint.Style.STROKE; strokeJoin=Paint.Join.ROUND; strokeCap=Paint.Cap.ROUND; xfermode=PorterDuffXfermode(PorterDuff.Mode.CLEAR) }
              var tool:DrawingTool=DrawingTool.PEN; var drawColor:Int=Color.WHITE; var strokeWidth:Float=8f
              private var drawBitmap:Bitmap?=null; private var drawCanvas:Canvas?=null; private val path=Path(); private var lastX=0f; private var lastY=0f
              private val undoStack=ArrayDeque<Bitmap>(); private val redoStack=ArrayDeque<Bitmap>()
              override fun onSizeChanged(w:Int,h:Int,oldw:Int,oldh:Int) { super.onSizeChanged(w,h,oldw,oldh); val prev=drawBitmap; drawBitmap=Bitmap.createBitmap(w,h,Bitmap.Config.ARGB_8888); drawCanvas=Canvas(drawBitmap!!); if(prev!=null&&!prev.isRecycled) { drawCanvas!!.drawBitmap(prev,0f,0f,null); prev.recycle() } }
              override fun onDraw(c:Canvas) { super.onDraw(c); drawBitmap?.let{c.drawBitmap(it,0f,0f,null)}; if(tool!=DrawingTool.ERASER) c.drawPath(path,configurePaint()) }
              override fun onTouchEvent(e:MotionEvent):Boolean { val x=e.x; val y=e.y
                  when(e.action) { MotionEvent.ACTION_DOWN -> { saveSnapshot(); path.reset(); path.moveTo(x,y); lastX=x; lastY=y }
                      MotionEvent.ACTION_MOVE -> { val mx=(lastX+x)/2f; val my=(lastY+y)/2f; path.quadTo(lastX,lastY,mx,my); lastX=x; lastY=y
                          if(tool==DrawingTool.ERASER){eraserPaint.strokeWidth=strokeWidth*3f; drawCanvas?.drawPath(path,eraserPaint); path.reset(); path.moveTo(x,y)} }
                      MotionEvent.ACTION_UP -> { path.lineTo(x,y); if(tool!=DrawingTool.ERASER) drawCanvas?.drawPath(path,configurePaint()); path.reset() } }
                  invalidate(); return true }
              private fun configurePaint():Paint = paint.apply { when(tool) {
                  DrawingTool.PEN -> { color=drawColor; strokeWidth=this@DrawingView.strokeWidth; alpha=255; maskFilter=null; xfermode=null }
                  DrawingTool.PENCIL -> { color=drawColor; strokeWidth=this@DrawingView.strokeWidth*0.7f; alpha=130; maskFilter=BlurMaskFilter(1.5f,BlurMaskFilter.Blur.NORMAL); xfermode=null }
                  DrawingTool.HIGHLIGHTER -> { color=drawColor; strokeWidth=this@DrawingView.strokeWidth*5f; alpha=80; maskFilter=null; xfermode=null }
                  DrawingTool.ERASER -> {} } }
              private fun saveSnapshot() { drawBitmap?.let { val s=it.copy(Bitmap.Config.ARGB_8888,false); undoStack.addLast(s); if(undoStack.size>30) undoStack.removeFirst().recycle(); redoStack.forEach{b->b.recycle()}; redoStack.clear() } }
              fun undo() { if(undoStack.isEmpty()) return; val cur=drawBitmap?.copy(Bitmap.Config.ARGB_8888,false); cur?.let{redoStack.addLast(it)}; val prev=undoStack.removeLast(); drawCanvas?.drawColor(Color.TRANSPARENT,PorterDuff.Mode.CLEAR); drawCanvas?.drawBitmap(prev,0f,0f,null); prev.recycle(); invalidate() }
              fun redo() { if(redoStack.isEmpty()) return; val cur=drawBitmap?.copy(Bitmap.Config.ARGB_8888,false); cur?.let{undoStack.addLast(it)}; val next=redoStack.removeLast(); drawCanvas?.drawColor(Color.TRANSPARENT,PorterDuff.Mode.CLEAR); drawCanvas?.drawBitmap(next,0f,0f,null); next.recycle(); invalidate() }
              fun clearCanvas() { saveSnapshot(); drawCanvas?.drawColor(Color.TRANSPARENT,PorterDuff.Mode.CLEAR); invalidate() }
              fun getBitmap():Bitmap?=drawBitmap?.copy(Bitmap.Config.ARGB_8888,false)
              fun loadBitmap(bmp:Bitmap?) { if(bmp==null) return; drawCanvas?.drawColor(Color.TRANSPARENT,PorterDuff.Mode.CLEAR); drawCanvas?.drawBitmap(bmp,0f,0f,null); invalidate() }
          }
