              private fun showNewSessionDialog() { val v=layoutInflater.inflate(R.layout.dialog_new_session,null); val es=v.findViewById<EditText>(R.id.etSubject); val et=v.findViewById<EditText>(R.id.etTopic)
                  AlertDialog.Builder(this).setTitle("New Lecture Session").setView(v).setPositiveButton("Start Writing"){_,_->val sub=es.text.toString().trim(); if(sub.isEmpty()){Toast.makeText(this,"Enter subject",Toast.LENGTH_SHORT).show();return@setPositiveButton}
                      val sess=Session(UUID.randomUUID().toString(),sub,et.text.toString().trim().ifEmpty{"General Notes"},SimpleDateFormat("EEE, MMM d",Locale.getDefault()).format(Date()),SimpleDateFormat("h:mm a",Locale.getDefault()).format(Date()),mutableListOf())
                      SessionManager.saveSession(this,sess); openSession(sess)}.setNegativeButton("Cancel",null).show() }
              private fun openSession(s:Session) { if(!Settings.canDrawOverlays(this)){AlertDialog.Builder(this).setTitle("Permission Required").setMessage("Enable 'Display over other apps' for OverlayNote in Settings.").setPositiveButton("Open Settings"){_,_->startActivity(Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,Uri.parse("package:$packageName")))}.setNegativeButton("Cancel",null).show();return}
                  startActivity(Intent(this,SessionActivity::class.java).putExtra("session_id",s.id)) }
              private fun deleteSession(s:Session) { AlertDialog.Builder(this).setTitle("Delete").setMessage("Delete \"${s.subject}\"?").setPositiveButton("Delete"){_,_->SessionManager.deleteSession(this,s.id);refresh()}.setNegativeButton("Cancel",null).show() }
          }
          class SessionAdapter(private val onOpen:(Session)->Unit, private val onDelete:(Session)->Unit):RecyclerView.Adapter<SessionAdapter.VH>() {
              private var list=listOf<Session>(); fun submitList(l:List<Session>){list=l;notifyDataSetChanged()}
              inner class VH(v:View):RecyclerView.ViewHolder(v){val tvS=v.findViewById<TextView>(R.id.tvSubject);val tvT=v.findViewById<TextView>(R.id.tvTopic);val tvD=v.findViewById<TextView>(R.id.tvDate);val tvP=v.findViewById<TextView>(R.id.tvPages);val del=v.findViewById<ImageButton>(R.id.btnDelete);val card=v.findViewById<androidx.cardview.widget.CardView>(R.id.card)}
              override fun onCreateViewHolder(p:ViewGroup,t:Int)=VH(LayoutInflater.from(p.context).inflate(R.layout.item_session,p,false))
              override fun onBindViewHolder(h:VH,i:Int){val s=list[i];h.tvS.text=s.subject;h.tvT.text=s.topic;h.tvD.text=s.date;h.tvP.text="${s.pages.size} page(s)";h.card.setOnClickListener{onOpen(s)};h.del.setOnClickListener{onDelete(s)}}
              override fun getItemCount()=list.size
          }
