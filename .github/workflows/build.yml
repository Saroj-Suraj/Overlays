                  fun start(ctx:Context,sid:String){val i=Intent(ctx,OverlayService::class.java).putExtra(EXTRA_SID,sid); if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.O) ctx.startForegroundService(i) else ctx.startService(i)}
