      - name: Build APK with Gradle
        run: |
          cd $GITHUB_WORKSPACE
          gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OverlayNote-APK
          path: "**/app-debug.apk"
          retention-days: 30
