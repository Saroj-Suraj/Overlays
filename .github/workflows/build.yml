                  tb.findViewById<ImageButton>(R.id.btnPen).setOnClickListener{dv.tool=DrawingTool.PEN;upTb()}
                  tb.findViewById<ImageButton>(R.id.btnPencil).setOnClickListener{dv.tool=DrawingTool.PENCIL;upTb()}
                  tb.findViewById<ImageButton>(R.id.btnHighlighter).setOnClickListener{dv.tool=DrawingTool.HIGHLIGHTER;upTb()}
                  tb.findViewById<ImageButton>(R.id.btnEraser).setOnClickListener{dv.tool=DrawingTool.ERASER;upTb()}
                  tb.findViewById<View>(R.id.btnColor).setOnClickListener{ci=(ci+1)%colors.size;dv.drawColor=colors[ci];upTb()}
                  tb.findViewById<View>(R.id.btnSize).setOnClickListener{si=(si+1)%sizes.size;dv.strokeWidth=sizes[si];upTb()}
