          cat > app/src/main/java/com/overlaynote/app/SessionManager.kt << 'SESSIONMGR'
          package com.overlaynote.app
          import android.content.Context; import android.graphics.Bitmap; import android.graphics.BitmapFactory
          import org.json.JSONArray; import org.json.JSONObject
          import java.io.File; import java.io.FileOutputStream; import java.util.UUID
          object SessionManager {
              private const val PREF="overlaynote_sessions"; private const val KEY="session_list"
              fun getSessions(ctx:Context):List<Session> { val p=ctx.getSharedPreferences(PREF,Context.MODE_PRIVATE); val j=p.getString(KEY,"[]")?:"[]"; return parse(j).sortedByDescending{it.created} }
              fun getSession(ctx:Context,id:String):Session?=getSessions(ctx).find{it.id==id}
              fun saveSession(ctx:Context,s:Session) { val l=getSessions(ctx).toMutableList(); val i=l.indexOfFirst{it.id==s.id}; if(i>=0) l[i]=s else l.add(0,s); persist(ctx,l) }
              fun deleteSession(ctx:Context,id:String) { persist(ctx,getSessions(ctx).filter{it.id!=id}); pageDir(ctx,id).deleteRecursively() }
              private fun persist(ctx:Context,l:List<Session>) { val a=JSONArray(); l.forEach{a.put(toJson(it))}; ctx.getSharedPreferences(PREF,Context.MODE_PRIVATE).edit().putString(KEY,a.toString()).apply() }
              fun savePages(ctx:Context,sid:String,pages:List<Bitmap?>) { val s=getSession(ctx,sid)?:return; val dir=pageDir(ctx,sid); dir.mkdirs(); val ids=mutableListOf<String>(); pages.forEachIndexed{i,bmp->val pid=if(i<s.pages.size)s.pages[i] else "page_${System.currentTimeMillis()}_$i"; ids.add(pid); bmp?.let{saveBmp(dir,pid,it)}}; saveSession(ctx,s.copy(pages=ids.toMutableList())) }
              fun loadPageBitmap(ctx:Context,sid:String,pid:String):Bitmap? { val f=File(pageDir(ctx,sid),"$pid.png"); return if(f.exists()) BitmapFactory.decodeFile(f.absolutePath) else null }
              private fun saveBmp(dir:File,pid:String,bmp:Bitmap) { FileOutputStream(File(dir,"$pid.png")).use{bmp.compress(Bitmap.CompressFormat.PNG,100,it)} }
              private fun pageDir(ctx:Context,sid:String)=File(ctx.filesDir,"sessions/$sid")
              private fun toJson(s:Session)=JSONObject().apply{put("id",s.id);put("subject",s.subject);put("topic",s.topic);put("date",s.date);put("created",s.created);put("pages",JSONArray(s.pages))}
              private fun parse(j:String):List<Session> { val a=JSONArray(j); return (0 until a.length()).map{val o=a.getJSONObject(it); val p=mutableListOf<String>(); val pa=o.optJSONArray("pages"); if(pa!=null) for(i in 0 until pa.length()) p.add(pa.getString(i)); Session(o.getString("id"),o.getString("subject"),o.getString("topic"),o.getString("date"),o.getString("created"),p) } }
          }
