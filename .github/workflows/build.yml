name: Build OverlayNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Find and fix gradlew
        run: |
          find . -name "gradlew" -type f
          GRADLEW=$(find . -name "gradlew" -type f | head -1)
          echo "Found gradlew at: $GRADLEW"
          chmod +x "$GRADLEW"
          PROJ_DIR=$(dirname "$GRADLEW")
          echo "PROJECT_DIR=$PROJ_DIR" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          cd $PROJECT_DIR
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OverlayNote-APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OverlayNote-APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
