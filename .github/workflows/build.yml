          package com.overlaynote.app
          import android.content.ContentValues; import android.content.Context; import android.graphics.Bitmap
          import android.os.Build; import android.os.Environment; import android.provider.MediaStore
          import java.io.File; import java.io.FileOutputStream
          object ExportHelper {
              fun savePng(ctx:Context,bmp:Bitmap,sid:String,page:Int) {
                  val fn="OverlayNote_${sid.take(6)}_page${page+1}_${System.currentTimeMillis()}.png"
                  if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.Q) {
                      val v=ContentValues().apply{put(MediaStore.Images.Media.DISPLAY_NAME,fn);put(MediaStore.Images.Media.MIME_TYPE,"image/png");put(MediaStore.Images.Media.RELATIVE_PATH,"${Environment.DIRECTORY_PICTURES}/OverlayNote");put(MediaStore.Images.Media.IS_PENDING,1)}
                      val uri=ctx.contentResolver.insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI,v)
                      uri?.let{ctx.contentResolver.openOutputStream(it)?.use{o->bmp.compress(Bitmap.CompressFormat.PNG,100,o)};v.clear();v.put(MediaStore.Images.Media.IS_PENDING,0);ctx.contentResolver.update(it,v,null,null)}
                  } else { val dir=File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_PICTURES),"OverlayNote"); dir.mkdirs(); FileOutputStream(File(dir,fn)).use{bmp.compress(Bitmap.CompressFormat.PNG,100,it)} }
              }
          }
